name: Update Homebrew Cask

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g., v0.2.10)"
        required: true
        type: string

permissions: {}

jobs:
  update-cask:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Extract version
        id: version
        run: echo "version=${TAG#v}" >> $GITHUB_OUTPUT
        env:
          TAG: ${{ inputs.tag }}

      - name: Get SHA256 checksums
        id: sha256
        run: |
          ARM_SHA=$(curl -sL "https://github.com/ChristopherZh-7/golish-platform/releases/download/${{ inputs.tag }}/golish_${{ steps.version.outputs.version }}_aarch64.dmg" | sha256sum | cut -d' ' -f1)
          X64_SHA=$(curl -sL "https://github.com/ChristopherZh-7/golish-platform/releases/download/${{ inputs.tag }}/golish_${{ steps.version.outputs.version }}_x64.dmg" | sha256sum | cut -d' ' -f1)
          echo "arm=$ARM_SHA" >> $GITHUB_OUTPUT
          echo "x64=$X64_SHA" >> $GITHUB_OUTPUT

      - name: Checkout homebrew-tap
        uses: actions/checkout@v4
        with:
          repository: ChristopherZh-7/homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}

      - name: Update cask formula
        run: |
          cat > Casks/golish.rb << 'EOF'
          cask "golish" do
            version "${{ steps.version.outputs.version }}"

            on_arm do
              sha256 "${{ steps.sha256.outputs.arm }}"
              url "https://github.com/ChristopherZh-7/golish-platform/releases/download/v#{version}/golish_#{version}_aarch64.dmg"
            end

            on_intel do
              sha256 "${{ steps.sha256.outputs.x64 }}"
              url "https://github.com/ChristopherZh-7/golish-platform/releases/download/v#{version}/golish_#{version}_x64.dmg"
            end

            name "Golish"
            desc "AI-powered penetration testing platform"
            homepage "https://github.com/ChristopherZh-7/golish-platform"

            livecheck do
              url :url
              strategy :github_latest
            end

            # Remove quarantine attribute to prevent Gatekeeper warnings
            postflight do
              system_command "/usr/bin/xattr",
                             args: ["-cr", "#{appdir}/golish.app"],
                             sudo: false
            end

            app "golish.app"

            zap trash: [
              "~/.golish",
              "~/Library/Application Support/com.golish.platform",
              "~/Library/Caches/com.golish.platform",
              "~/Library/Preferences/com.golish.platform.plist",
              "~/Library/Saved Application State/com.golish.platform.savedState",
            ]
          end
          EOF

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Casks/golish.rb
          git commit -m "Update golish to ${{ steps.version.outputs.version }}"
          git push
